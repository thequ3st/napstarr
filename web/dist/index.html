<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Napstarr</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="logo.svg">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="Napstarr — Decentralized music. Your library. Your network.">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <img src="logo.svg" width="72" height="72" alt="Napstarr">
        <h1>Nap<span>starr</span></h1>
        <p class="login-tagline">Your music. Your network.</p>
      </div>
      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label for="login-user">Username</label>
          <input type="text" id="login-user" class="form-input" name="username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="login-pass">Password</label>
          <input type="password" id="login-pass" class="form-input" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="login-btn">Sign In</button>
        <div class="login-error" id="login-error"></div>
      </form>
    </div>
  </div>

  <!-- App Shell (hidden until auth) -->
  <div id="app-shell" class="app-shell hidden">
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <img src="logo.svg" width="28" height="28" alt="">
          <span class="sidebar-brand">Nap<em>starr</em></span>
        </div>
      </div>
      <ul class="sidebar-nav" id="sidebar-nav">
        <li><a href="#" data-view="home" class="nav-link active">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Home</span>
        </a></li>
        <li><a href="#" data-view="artists" class="nav-link">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zm-4 7a7 7 0 00-7 7h14a7 7 0 00-7-7z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Artists</span>
        </a></li>
        <li><a href="#" data-view="albums" class="nav-link">
          <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          <span>Albums</span>
        </a></li>
        <li><a href="#" data-view="search" class="nav-link">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Search</span>
        </a></li>
        <li><a href="#" data-view="network" class="nav-link">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Network</span>
        </a></li>
      </ul>
      <div class="sidebar-divider"></div>
      <div class="sidebar-footer" id="sidebar-footer">
        <div class="instance-badge">
          <span class="instance-dot" id="instance-dot"></span>
          <div class="instance-meta">
            <span class="instance-name" id="instance-name">---</span>
            <span class="instance-id" id="instance-id">---</span>
          </div>
        </div>
      </div>
    </nav>

    <!-- Mobile Tab Bar -->
    <nav id="mobile-tabs" class="mobile-tabs">
      <a href="#" data-view="home" class="tab-link active">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Home</span>
      </a>
      <a href="#" data-view="artists" class="tab-link">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zm-4 7a7 7 0 00-7 7h14a7 7 0 00-7-7z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Artists</span>
      </a>
      <a href="#" data-view="albums" class="tab-link">
        <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        <span>Albums</span>
      </a>
      <a href="#" data-view="search" class="tab-link">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Search</span>
      </a>
      <a href="#" data-view="network" class="tab-link">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Network</span>
      </a>
    </nav>

    <!-- Main Content Area -->
    <main id="main-content" class="main-content"></main>

    <!-- Player Bar -->
    <div id="player-bar" class="player-bar">
      <div class="player-progress" id="player-progress">
        <div class="player-progress-fill" id="player-progress-fill"></div>
      </div>
      <div class="player-inner">
        <div class="player-track-info">
          <div class="player-art" id="player-art">
            <div class="player-art-placeholder">
              <svg viewBox="0 0 24 24" width="24" height="24"><circle cx="12" cy="12" r="10" fill="none" stroke="#333" stroke-width="1.5"/><circle cx="12" cy="12" r="3" fill="#333"/></svg>
            </div>
          </div>
          <div class="player-track-text">
            <div class="player-track-title" id="player-title">Not Playing</div>
            <div class="player-track-artist" id="player-artist">---</div>
            <div class="player-remote-badge hidden" id="player-remote-badge">STREAMING FROM <span id="player-remote-name"></span></div>
          </div>
        </div>
        <div class="player-controls">
          <button class="player-btn" id="btn-prev" title="Previous">
            <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" fill="currentColor"/></svg>
          </button>
          <button class="player-btn player-btn-play" id="btn-play" title="Play">
            <svg viewBox="0 0 24 24" id="play-icon"><polygon points="8,5 19,12 8,19" fill="currentColor"/></svg>
          </button>
          <button class="player-btn" id="btn-next" title="Next">
            <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" fill="currentColor"/></svg>
          </button>
        </div>
        <div class="player-right-section">
          <div class="player-time">
            <span id="player-current">0:00</span>
            <span class="time-sep">/</span>
            <span id="player-duration">0:00</span>
          </div>
          <div class="player-volume">
            <button class="player-btn volume-btn" id="btn-volume" title="Volume">
              <svg viewBox="0 0 24 24" id="volume-icon"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" fill="currentColor"/></svg>
            </button>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.01" value="0.8">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-content" id="modal-content"></div>
  </div>

  <audio id="audio-el" preload="auto"></audio>
  <script src="app.js"></script>
</body>
</html>
