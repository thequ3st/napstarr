<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#08080c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Napstarr</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <img src="logo.svg" alt="Napstarr" class="login-logo">
      <h1 class="login-title">Napstarr</h1>
      <p class="login-subtitle">Your music. Your network.</p>
      <form id="login-form" autocomplete="on">
        <div class="input-group">
          <label for="login-user">Username</label>
          <input type="text" id="login-user" name="username" autocomplete="username" required placeholder="Enter username">
        </div>
        <div class="input-group">
          <label for="login-pass">Password</label>
          <input type="password" id="login-pass" name="password" autocomplete="current-password" required placeholder="Enter password">
        </div>
        <div id="login-error" class="login-error" hidden></div>
        <button type="submit" class="btn-primary btn-login">Sign In</button>
      </form>
    </div>
  </div>

  <!-- App Shell -->
  <div id="app-shell" class="app-shell" hidden>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-top">
        <a href="#home" class="sidebar-logo">
          <img src="logo.svg" alt="Napstarr" width="36" height="36">
          <span class="sidebar-brand">Napstarr</span>
        </a>
        <nav class="sidebar-nav">
          <a href="#home" class="nav-link active" data-view="home">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Home</span>
          </a>
          <a href="#artists" class="nav-link" data-view="artists">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Artists</span>
          </a>
          <a href="#albums" class="nav-link" data-view="albums">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
            <span>Albums</span>
          </a>
          <a href="#search" class="nav-link" data-view="search">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span>Search</span>
          </a>
          <a href="#network" class="nav-link" data-view="network">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="3"/><circle cx="5" cy="19" r="3"/><circle cx="19" cy="19" r="3"/><line x1="12" y1="8" x2="5" y2="16"/><line x1="12" y1="8" x2="19" y2="16"/></svg>
            <span>Network</span>
          </a>
        </nav>
      </div>
      <div class="sidebar-bottom">
        <div id="instance-info" class="instance-info"></div>
      </div>
    </aside>

    <!-- Main Content -->
    <main id="main-content" class="main-content">
      <div id="view-container" class="view-container"></div>
    </main>

    <!-- Player Bar -->
    <div id="player-bar" class="player-bar" hidden>
      <div class="player-progress-wrap" id="player-progress-wrap">
        <div class="player-progress-fill" id="player-progress-fill"></div>
      </div>
      <div class="player-inner">
        <div class="player-track-info">
          <img id="player-art" class="player-art" src="" alt="">
          <div class="player-text">
            <div class="player-title" id="player-title">Not playing</div>
            <div class="player-artist" id="player-artist"></div>
          </div>
          <span id="player-remote-badge" class="remote-badge" hidden>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"/><circle cx="5" cy="19" r="3"/><circle cx="19" cy="19" r="3"/><line x1="12" y1="8" x2="5" y2="16"/><line x1="12" y1="8" x2="19" y2="16"/></svg>
            <span id="player-remote-name"></span>
          </span>
        </div>
        <div class="player-controls">
          <button class="player-btn player-btn-secondary" data-action="prev-track" aria-label="Previous">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
          </button>
          <button class="player-btn player-btn-play" data-action="toggle-play" aria-label="Play" id="player-play-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" id="play-icon"><polygon points="5,3 19,12 5,21"/></svg>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" id="pause-icon" hidden><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          </button>
          <button class="player-btn player-btn-secondary" data-action="next-track" aria-label="Next">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm10-12v12h2V6h-2z"/></svg>
          </button>
        </div>
        <div class="player-right">
          <span class="player-time" id="player-time">0:00 / 0:00</span>
          <div class="player-volume">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.08"/></svg>
            <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.01" value="0.8">
          </div>
        </div>
      </div>
    </div>

    <!-- Mobile Bottom Tab Bar -->
    <nav class="mobile-tabs">
      <a href="#home" class="mobile-tab active" data-view="home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </a>
      <a href="#artists" class="mobile-tab" data-view="artists">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Artists</span>
      </a>
      <a href="#albums" class="mobile-tab" data-view="albums">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
        <span>Albums</span>
      </a>
      <a href="#search" class="mobile-tab" data-view="search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Search</span>
      </a>
      <a href="#network" class="mobile-tab" data-view="network">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="3"/><circle cx="5" cy="19" r="3"/><circle cx="19" cy="19" r="3"/><line x1="12" y1="8" x2="5" y2="16"/><line x1="12" y1="8" x2="19" y2="16"/></svg>
        <span>Network</span>
      </a>
    </nav>

  </div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal-backdrop" data-action="close-modal"></div>
    <div class="modal-content" id="modal-content"></div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
