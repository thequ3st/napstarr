<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6D28D9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>

  <!-- Headphone band (arc) -->
  <path d="M148 280 C148 180, 364 180, 364 280"
        fill="none" stroke="url(#purple)" stroke-width="22" stroke-linecap="round"/>

  <!-- Left ear cup -->
  <rect x="126" y="260" width="44" height="72" rx="14" fill="url(#purple)"/>
  <rect x="132" y="266" width="32" height="60" rx="10" fill="#1a1a2e" opacity="0.4"/>

  <!-- Right ear cup -->
  <rect x="342" y="260" width="44" height="72" rx="14" fill="url(#purple)"/>
  <rect x="348" y="266" width="32" height="60" rx="10" fill="#1a1a2e" opacity="0.4"/>

  <!-- "N" letter -->
  <!-- Left vertical bar -->
  <rect x="200" y="228" width="28" height="120" rx="4" fill="url(#glow)"/>
  <!-- Right vertical bar -->
  <rect x="284" y="228" width="28" height="120" rx="4" fill="url(#glow)"/>
  <!-- Diagonal -->
  <polygon points="200,228 228,228 312,348 284,348" fill="url(#glow)"/>

  <!-- Sound bars (equalizer lines flanking the N) -->
  <!-- Left side -->
  <rect x="178" y="280" width="8" height="56" rx="4" fill="url(#purple)" opacity="0.5"/>
  <rect x="164" y="296" width="8" height="40" rx="4" fill="url(#purple)" opacity="0.35"/>

  <!-- Right side -->
  <rect x="326" y="280" width="8" height="56" rx="4" fill="url(#purple)" opacity="0.5"/>
  <rect x="340" y="296" width="8" height="40" rx="4" fill="url(#purple)" opacity="0.35"/>

  <!-- Sparkle top-right -->
  <g transform="translate(345, 210)" fill="#C4B5FD">
    <rect x="-1.5" y="-8" width="3" height="16" rx="1.5"/>
    <rect x="-8" y="-1.5" width="16" height="3" rx="1.5"/>
    <rect x="-5" y="-5" width="10" height="10" rx="1" transform="rotate(45)" opacity="0.5"/>
  </g>

  <!-- Smaller sparkle -->
  <g transform="translate(365, 235) scale(0.5)" fill="#C4B5FD" opacity="0.6">
    <rect x="-1.5" y="-8" width="3" height="16" rx="1.5"/>
    <rect x="-8" y="-1.5" width="16" height="3" rx="1.5"/>
  </g>
</svg>
